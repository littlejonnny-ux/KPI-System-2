name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: TypeCheck
        run: npx tsc --noEmit
      - name: Test
        run: npm run test -- --run
      - name: Build
        run: npm run build

  vkf-compliance-gate:
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run VKF Compliance Gate
        run: node scripts/vkf-compliance-gate.mjs

  migration-safety:
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run Migration Safety Analyzer
        run: node scripts/migration-safety-analyzer.mjs

  e2e:
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'pull_request'
    # continue-on-error убран — тесты блокируют merge при падении
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Install Playwright
        run: npx playwright install --with-deps chromium
      - name: Run E2E tests
        run: npx playwright test
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

  e2e-coverage-check:
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Check E2E test exists
        run: |
          count=$(find src/__tests__/e2e -name "*.spec.ts" 2>/dev/null | wc -l)
          if [ "$count" -eq "0" ]; then
            echo "❌ No E2E tests found. Add at least navigation.spec.ts."
            exit 1
          fi
          echo "✅ E2E tests present: $count spec files"
